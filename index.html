<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathon Guide</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <!-- BANNER -->
    <div class="banner">
      <img src="images/course.png" alt="Marathon">
      <div class="banner-content">
        <h1>Change your life, run a marathon</h1>
        <p>Everything you need to know to run your first 42km.</p>
        <a href="#levels" class="btn-blue">Discover your level</a>
      </div>
    </div>

    <!-- LEVELS -->
    <div class="levels" id="levels">
      <h2>Choose your level</h2>

      <div class="levels-grid">

        <div class="card">
          <img src="images/Debutant.png" alt="Beginner">
          <h3>Beginner</h3>
        
        </div>

        <div class="card">
          <img src="images/Intermediaire.png" alt="Intermediate">
          <h3>Intermediate</h3>
          
        </div>

        <div class="card">
          <img src="images/Pro.png" alt="Pro">
          <h3>Pro</h3>
         
        </div>

      </div>
    </div>

    <!-- TYPEFORM -->
    <div class="form-section" id="contact">
      <h2>Get your guide by email</h2>
      <p>Fill in the form and receive your personalized marathon guide for free.</p>
      <div data-tf-live="01KMXAR9D58SVMSZZPRVXD3ZSZ"></div>
      <script src="https://embed.typeform.com/next/embed.js"></script>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
   
    </footer>

  </body>
</html>
